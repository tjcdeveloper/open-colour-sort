name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      # Unit tests include the level-set integrity checks (all 500 baked
      # levels parse, are unsolved at start, and are solver-verified).
      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug
